unbind r
bind r source-file ~/.tmux.conf
set-option default-terminal "tmux-256color"
# set -g @plugin 'catppuccin/tmux#latest' # See https://github.com/catppuccin/tmux/tags for additional tags
# set -g @plugin "janoamaral/tokyo-night-tmux"


set -g @catppuccin_flavor 'mocha' # mocha,frappe, macchiato or mocha
set -g @catppuccin_window_status_style "rounded"
# set -g @catppuccin_pane_status_enabled "no"
# set -g @catppuccin_pane_border_status "off" # See `pane-border-status`
# set -g @catppuccin_pane_left_separator "█"
# set -g @catppuccin_pane_right_separator "█"
# set -g @catppuccin_pane_middle_separator "█"
# set -g @catppuccin_pane_number_position "left"
# set -g @catppuccin_pane_default_fill "number"
#set -g @catppuccin_pane_default_text "#{b:pane_current_path}"
# set -g @catppuccin_pane_border_style "fg=#{thm_orange}"
# set -g @catppuccin_pane_active_border_style "fg=#{thm_orange}"
# set -g @catppuccin_pane_color "#{thm_orange}"
# set -g @catppuccin_pane_background_color "#{thm_orange}"
set -g @catppuccin_window_current_text "#{?automatic-rename,#{window_name}@#{b:pane_current_path},#{window_name}}"
set -g @catppuccin_window_default_text "#{?automatic-rename,#{window_name}@#{b:pane_current_path},#{window_name}}"
set -g @catppuccin_window_text "#{?automatic-rename,#{window_name}@#{b:pane_current_path},#{window_name}}"


run `~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux`

set -g pane-border-style 'fg=#45475a'
set -g pane-active-border-style "#{?pane_in_mode,fg=#f9e2af bold,fg=#89b4fa bold}"

set -g window-style        'bg=#1e1e2e'
set -g window-active-style 'bg=#181825'

set-hook -g pane-mode-changed "set -gF window-active-style 'bg=#{?pane_in_mode,#2a1d27,#181825}'"

set -g status-left "#{?pane_in_mode,#[bg=#f9e2af#,fg=#1e1e2e#,bold] COPY #[default] ,}#[bg=#1e1e2e#,fg=#89b4fa#,bold] #S #[default]"
set -g status-left-length 40

set-option -sg escape-time 10
#set-option -g default-command "reattach-to-user-namespace -l zsh"
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe "pbcopy"
# set-option -sa terminal-overrides ',xterm-256color:RGB'
set-option -g focus-events on
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind w choose-tree -Zw -F "#{?pane_format,#{pane_current_command}#{?pane_active, (active),},#{?window_format,#{window_index}: #{?automatic-rename,#{window_name}@#{b:pane_current_path},#{window_name}}#{window_flags},#{session_name}: #{session_windows} windows#{?session_attached, (attached),}}}"

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind -n M-[ switch-client -p
bind -n M-] switch-client -n
bind -n M-\\ switch-client -l

bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'

TMUX_FZF_LAUNCH_KEY="F"
bind-key f display-popup -E -w 80% -h 85% "~/.config/tmux/scripts/fzf-window.sh"
bind-key C-f run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/session.sh switch"

# Preserve sessions/windows across restarts
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'vi vim nvim emacs man less more tail top htop ssh psql mysql sqlite3 "~rails server" "~rails console"'
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'
